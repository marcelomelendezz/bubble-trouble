<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Semillas Eternas</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;user-select:none;}
#app{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:100%;height:100%;
  background:radial-gradient(ellipse at 30% 20%,#1a3a2a 0%,#0a1f14 50%,#050f0a 100%);
  font-family:'Nunito',sans-serif;
}
#hud{
  width:100%;max-width:400px;display:flex;align-items:center;
  justify-content:space-between;padding:6px 12px 6px;
}
.sbox{
  background:rgba(255,255,255,0.07);border:1.5px solid rgba(74,222,128,0.2);
  border-radius:12px;padding:4px 14px;text-align:center;min-width:72px;
}
.sbox .lbl{font-size:8px;color:rgba(255,255,255,0.45);letter-spacing:2px;font-weight:800;}
.sbox .val{font-size:20px;color:#fff;font-weight:900;line-height:1.2;transition:transform 0.15s;}
.sbox .val.bump{animation:bump 0.2s ease;}
@keyframes bump{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
.title{
  font-size:28px;font-weight:900;
  background:linear-gradient(135deg,#4ade80,#ca8a04,#67e8f9);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 14px rgba(74,222,128,0.4));
}

/* BOARD */
#board{
  position:relative;
  background:rgba(60,90,70,0.08);
  border:1.5px solid rgba(74,222,128,0.15);
  border-radius:18px;
  box-shadow:0 10px 50px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.06);
  touch-action:none;flex-shrink:0;
}

/* empty cells - soil patches */
.ecell{
  position:absolute;
  background:rgba(40,70,55,0.25);
  border:1.5px solid rgba(74,222,128,0.08);
  border-radius:12px;
}

/* TILES - plant growth styles */
.tile{
  position:absolute;
  display:flex;align-items:center;justify-content:center;
  border-radius:14px;font-weight:900;
  box-shadow:0 4px 14px rgba(0,0,0,0.35);
}
.tile.moving{
  transition:left 0.13s cubic-bezier(0.3,0,0.2,1),
             top  0.13s cubic-bezier(0.3,0,0.2,1);
}
.tile.spawn{animation:spawn 0.18s cubic-bezier(0.34,1.56,0.64,1) both;animation-delay:0.1s;}
.tile.mergeflash{animation:mergeflash 0.22s cubic-bezier(0.34,1.56,0.64,1) both;animation-delay:0.1s;}
@keyframes spawn{0%{transform:scale(0.6);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes mergeflash{0%{transform:scale(1)}45%{transform:scale(1.22)}100%{transform:scale(1)}}

/* CONTROLS */
#controls{
  display:grid;grid-template-columns:54px 54px 54px;
  grid-template-rows:46px 46px;gap:6px;margin-top:10px;
}
.dbtn{
  background:rgba(255,255,255,0.06);border:1.5px solid rgba(74,222,128,0.2);
  border-radius:12px;color:rgba(255,255,255,0.7);font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;touch-action:manipulation;
  transition:all 0.07s;
}
.dbtn:active,.dbtn.pressed{background:rgba(74,222,128,0.25);color:#fff;transform:scale(0.92);}

/* OVERLAY */
#overlay{
  display:none;position:absolute;inset:0;z-index:50;
  background:rgba(5,15,10,0.88);backdrop-filter:blur(8px);
  align-items:center;justify-content:center;flex-direction:column;gap:14px;
  border-radius:18px;
}
#overlay.show{display:flex;}
.ov-title{font-size:clamp(22px,6.5vw,34px);font-weight:900;text-align:center;}
.ov-score{font-size:clamp(15px,3.8vw,22px);font-weight:900;color:#ca8a04;}
.ov-btn{
  padding:10px 28px;border-radius:14px;cursor:pointer;font-size:15px;font-weight:900;
  font-family:'Nunito',sans-serif;border:none;
  background:linear-gradient(135deg,#4ade80,#ca8a04);color:#0a1f14;
  box-shadow:0 4px 18px rgba(74,222,128,0.45);
}
.ov-btn:active{transform:scale(0.95);}

/* score float */
.sfloat{
  position:fixed;font-size:15px;font-weight:900;color:#ca8a04;pointer-events:none;z-index:200;
  text-shadow:0 0 8px rgba(202,138,4,0.8);
  animation:sfloat 0.9s ease-out forwards;
}
@keyframes sfloat{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-55px)}}
</style>
</head>
<body>
<div id="app">
  <div id="hud">
    <div class="sbox"><div class="lbl">VITALIDAD</div><div class="val" id="scoreEl">0</div></div>
    <div class="title">Semillas Eternas</div>
    <div class="sbox"><div class="lbl">MÁXIMO</div><div class="val" id="bestEl">0</div></div>
  </div>

  <div id="board">
    <div id="overlay">
      <div class="ov-title" id="ovTitle"></div>
      <div class="ov-score" id="ovScore"></div>
      <button class="ov-btn" id="ovBtn">🌱 Cultivar otra vez</button>
    </div>
  </div>

  <div id="controls">
    <div></div>
    <button class="dbtn" id="btnU">▲</button>
    <div></div>
    <button class="dbtn" id="btnL">◀</button>
    <button class="dbtn" id="btnD">▼</button>
    <button class="dbtn" id="btnR">▶</button>
  </div>
</div>

<script>
// ── ESTILOS DE CRECIMIENTO ─────────────────────────────────
const CRECIMIENTO_STYLE = {
  2:    {bg:'rgba(180,220,160,0.95)', fg:'#2d5a2d', sh:''},
  4:    {bg:'rgba(140,200,130,0.95)', fg:'#1f4a1f', sh:''},
  8:    {bg:'#4ade80',               fg:'#0a2a12', sh:'0 0 16px rgba(74,222,128,0.5)'},
  16:   {bg:'#22c55e',               fg:'#05240f', sh:'0 0 18px rgba(34,197,94,0.55)'},
  32:   {bg:'#16a34a',               fg:'#fff',     sh:'0 0 20px rgba(22,163,74,0.6)'},
  64:   {bg:'#ca8a04',               fg:'#fff',     sh:'0 0 22px rgba(202,138,4,0.6)'},
  128:  {bg:'linear-gradient(135deg,#4ade80,#ca8a04)', fg:'#0a2a12', sh:'0 0 26px rgba(74,222,128,0.65)'},
  256:  {bg:'linear-gradient(135deg,#67e8f9,#4ade80)', fg:'#0a2a12', sh:'0 0 26px rgba(103,232,249,0.6)'},
  512:  {bg:'linear-gradient(135deg,#ca8a04,#f59e0b)', fg:'#0a2a12', sh:'0 0 30px rgba(202,138,4,0.7)'},
  1024: {bg:'linear-gradient(135deg,#4ade80,#eab308)', fg:'#05240f', sh:'0 0 34px rgba(74,222,128,0.75)'},
  2048: {bg:'linear-gradient(135deg,#ca8a04,#4ade80,#fef08c)', fg:'#0a2a12', sh:'0 0 42px rgba(202,138,4,0.9)'},
};
function getCrecimientoStyle(v){ return CRECIMIENTO_STYLE[v]||{bg:'linear-gradient(135deg,#166534,#4ade80)',fg:'#fff',sh:'0 0 28px rgba(74,222,128,0.7)'}; }

// ── LAYOUT ────────────────────────────────────────────────
const N=4, ANIM_MS=130;
const board    = document.getElementById('board');
const overlay  = document.getElementById('overlay');
let CELL, PAD, GAP;

function layout(){
  const app   = document.getElementById('app');
  const hud   = document.getElementById('hud');
  const ctrl  = document.getElementById('controls');
  const appW  = app.clientWidth;
  const appH  = app.clientHeight;
  const hudH  = hud.offsetHeight||52;
  const ctrlH = ctrl.offsetHeight||110;
  const avail = Math.min(appW - 20, appH - hudH - ctrlH - 28);
  PAD  = Math.max(8,  Math.floor(avail * 0.032));
  GAP  = Math.max(6,  Math.floor(avail * 0.024));
  CELL = Math.floor((avail - PAD*2 - GAP*(N-1)) / N);
  const bSize = PAD*2 + CELL*N + GAP*(N-1);
  board.style.width  = bSize+'px';
  board.style.height = bSize+'px';
  buildEmptyCells();
}

function buildEmptyCells(){
  board.querySelectorAll('.ecell').forEach(e=>e.remove());
  for(let r=0;r<N;r++) for(let c=0;c<N;c++){
    const d=document.createElement('div');
    d.className='ecell';
    Object.assign(d.style,{left:tileX(c)+'px',top:tileY(r)+'px',width:CELL+'px',height:CELL+'px'});
    board.appendChild(d);
  }
}

function tileX(c){ return PAD + c*(CELL+GAP); }
function tileY(r){ return PAD + r*(CELL+GAP); }

// ── GAME STATE ────────────────────────────────────────────
let grid, score, best, busy;
let tileEls = {};
let nextId  = 0;

function cellId(){ return nextId++; }

function initGame(){
  grid  = Array.from({length:N},()=>Array(N).fill(null));
  score = 0; busy = false;
  best  = parseInt(localStorage.getItem('semillasBest')||'0');
  setScore(0);
  document.getElementById('bestEl').textContent = best;
  overlay.classList.remove('show');
  board.querySelectorAll('.tile').forEach(e=>e.remove());
  tileEls = {}; nextId = 0;
  spawnRandom(); spawnRandom();
  renderAll(false);
}

function spawnRandom(){
  const empty=[];
  for(let r=0;r<N;r++) for(let c=0;c<N;c++) if(!grid[r][c]) empty.push([r,c]);
  if(!empty.length) return null;
  const [r,c]=empty[Math.floor(Math.random()*empty.length)];
  const id=cellId();
  grid[r][c]={val:Math.random()<0.9?2:4, id, isNew:true};
  return {r,c};
}

function setScore(v){
  score=v; document.getElementById('scoreEl').textContent=v;
}

// ── MOVE LOGIC ────────────────────────────────────────────
function doMove(dir){
  if(busy) return;

  const moves   = [];
  const merges  = [];
  let pts = 0;
  let changed = false;

  for(let line=0; line<N; line++){
    let cells = [];
    for(let i=0;i<N;i++){
      let r,c;
      if(dir==='left')  {r=line;c=i;}
      if(dir==='right') {r=line;c=N-1-i;}
      if(dir==='up')    {r=i;c=line;}
      if(dir==='down')  {r=N-1-i;c=line;}
      if(grid[r][c]) cells.push({...grid[r][c],r,c});
    }

    const result = [];
    let i=0;
    while(i<cells.length){
      if(i+1<cells.length && cells[i].val===cells[i+1].val){
        const newVal = cells[i].val*2;
        const newId  = cellId();
        pts += newVal;
        result.push({val:newVal, id:newId, merged:true, kill:[cells[i].id,cells[i+1].id]});
        i+=2;
      } else {
        result.push({...cells[i]});
        i++;
      }
    }

    while(result.length<N) result.push(null);

    for(let j=0;j<N;j++){
      let r,c;
      if(dir==='left')  {r=line;c=j;}
      if(dir==='right') {r=line;c=N-1-j;}
      if(dir==='up')    {r=j;c=line;}
      if(dir==='down')  {r=N-1-j;c=line;}

      const cell = result[j];
      if(!cell){ grid[r][c]=null; continue; }

      if(cell.merged){
        cell.kill.forEach(kid=>{
          const orig = findCell(kid);
          if(orig) moves.push({id:kid, fr:orig.r, fc:orig.c, tr:r, tc:c});
        });
        merges.push({id:cell.id, val:cell.val, r, c});
        grid[r][c] = {val:cell.val, id:cell.id, isMerge:true};
        changed = true;
      } else {
        if(cell.r!==r||cell.c!==c) changed=true;
        moves.push({id:cell.id, fr:cell.r, fc:cell.c, tr:r, tc:c});
        grid[r][c] = {val:cell.val, id:cell.id};
      }
    }
  }

  if(!changed) return;

  if(pts>0){
    const ns = score+pts;
    setScore(ns);
    if(ns>best){ best=ns; localStorage.setItem('semillasBest',best); document.getElementById('bestEl').textContent=best; }
    showScoreFloat('+'+pts);
    document.getElementById('scoreEl').classList.remove('bump');
    void document.getElementById('scoreEl').offsetWidth;
    document.getElementById('scoreEl').classList.add('bump');
  }

  busy = true;
  board.querySelectorAll('.tile').forEach(t=>t.classList.add('moving'));

  moves.forEach(m=>{
    const el = tileEls[m.id];
    if(el){ el.style.left=tileX(m.tc)+'px'; el.style.top=tileY(m.tr)+'px'; }
  });

  setTimeout(()=>{
    board.querySelectorAll('.tile').forEach(t=>t.classList.remove('moving'));

    const killIds = new Set();
    merges.forEach(m=>{
      moves.filter(mv=>mv.tr===m.r&&mv.tc===m.c).forEach(mv=>killIds.add(mv.id));
    });
    killIds.forEach(id=>{
      if(tileEls[id]){ tileEls[id].remove(); delete tileEls[id]; }
    });

    merges.forEach(m=>{
      const el=createTileEl(m.val, m.r, m.c, 'mergeflash');
      tileEls[m.id]=el;
      board.appendChild(el);
    });

    const nc = spawnRandom();
    if(nc){
      const cell = grid[nc.r][nc.c];
      const el   = createTileEl(cell.val, nc.r, nc.c, 'spawn');
      tileEls[cell.id] = el;
      board.appendChild(el);
    }

    busy=false;
    checkEnd();
  }, ANIM_MS+20);
}

function findCell(id){
  for(let r=0;r<N;r++) for(let c=0;c<N;c++) if(grid[r][c]&&grid[r][c].id===id) return {r,c};
  return null;
}

// ── RENDER ────────────────────────────────────────────────
function createTileEl(val, r, c, animClass=''){
  const el  = document.createElement('div');
  el.className = 'tile'+(animClass?' '+animClass:'');
  const st  = getCrecimientoStyle(val);
  const fs  = val>=1000 ? CELL*0.30 : val>=100 ? CELL*0.34 : CELL*0.42;
  el.style.cssText=`
    left:${tileX(c)}px;top:${tileY(r)}px;
    width:${CELL}px;height:${CELL}px;
    background:${st.bg};color:${st.fg};
    font-size:${fs}px;
    box-shadow:${st.sh||'0 4px 12px rgba(0,0,0,0.35)'};
    letter-spacing:-0.5px;
  `;
  el.textContent = val;
  return el;
}

function renderAll(withAnim){
  board.querySelectorAll('.tile').forEach(e=>e.remove());
  tileEls={};
  for(let r=0;r<N;r++) for(let c=0;c<N;c++){
    if(!grid[r][c]) continue;
    const {val,id}=grid[r][c];
    const el=createTileEl(val,r,c,withAnim?'spawn':'');
    tileEls[id]=el;
    board.appendChild(el);
  }
}

// ── END CHECK ────────────────────────────────────────────
function checkEnd(){
  if(grid.flat().some(c=>c&&c.val===2048)){
    showEnd(true); return;
  }
  for(let r=0;r<N;r++) for(let c=0;c<N;c++) if(!grid[r][c]) return;
  for(let r=0;r<N;r++) for(let c=0;c<N;c++){
    if(c<N-1&&grid[r][c]&&grid[r][c+1]&&grid[r][c].val===grid[r][c+1].val) return;
    if(r<N-1&&grid[r][c]&&grid[r+1][c]&&grid[r][c].val===grid[r+1][c].val) return;
  }
  showEnd(false);
}

function showEnd(win){
  document.getElementById('ovTitle').textContent = win?'🌳 ¡Árbol Despertado!':'🍂 Jardín Marchito';
  document.getElementById('ovTitle').style.cssText = win
    ? 'background:linear-gradient(135deg,#ca8a04,#4ade80);-webkit-background-clip:text;-webkit-text-fill-color:transparent'
    : 'color:#f59e0b';
  document.getElementById('ovScore').textContent = 'Vitalidad: '+score;
  overlay.classList.add('show');
}

// ── SCORE FLOAT ──────────────────────────────────────────
function showScoreFloat(txt){
  const el=document.createElement('div'); el.className='sfloat'; el.textContent=txt;
  const r=board.getBoundingClientRect();
  el.style.left=(r.left+r.width/2-18)+'px';
  el.style.top =(r.top+r.height*0.38)+'px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),900);
}

// ── INPUT ────────────────────────────────────────────────
const keys={};
function setupBtn(id,dir){
  const btn=document.getElementById(id);
  const on=()=>{ keys[dir]=true; btn.classList.add('pressed'); };
  const off=()=>{ keys[dir]=false; btn.classList.remove('pressed'); };
  btn.addEventListener('mousedown',on); btn.addEventListener('mouseup',off); btn.addEventListener('mouseleave',off);
  btn.addEventListener('touchstart',e=>{e.preventDefault();on();doMove(dir);},{passive:false});
  btn.addEventListener('touchend',e=>{e.preventDefault();off();},{passive:false});
}
setupBtn('btnU','up'); setupBtn('btnD','down'); setupBtn('btnL','left'); setupBtn('btnR','right');

document.addEventListener('keydown',e=>{
  const map={ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right',KeyW:'up',KeyS:'down',KeyA:'left',KeyD:'right'};
  if(map[e.code]){ e.preventDefault(); doMove(map[e.code]); }
});

let sw0=null;
board.addEventListener('touchstart',e=>{ sw0={x:e.touches[0].clientX,y:e.touches[0].clientY}; },{passive:true});
board.addEventListener('touchend',e=>{
  if(!sw0) return;
  const dx=e.changedTouches[0].clientX-sw0.x, dy=e.changedTouches[0].clientY-sw0.y;
  if(Math.max(Math.abs(dx),Math.abs(dy))<18) return;
  doMove(Math.abs(dx)>Math.abs(dy)?(dx>0?'right':'left'):(dy>0?'down':'up'));
  sw0=null;
});

document.getElementById('ovBtn').addEventListener('click',()=>initGame());

window.addEventListener('load',()=>{ setTimeout(()=>{ layout(); initGame(); },80); });
window.addEventListener('resize',()=>{ layout(); renderAll(false); });
</script>
</body>
</html>
